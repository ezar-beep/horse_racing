<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Members</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-nav {
            background: #2c3e50;
            color: white;
        }
        .admin-nav .nav-link {
            color: white;
        }
        .admin-nav .nav-link:hover {
            background: #34495e;
        }
        .admin-nav .nav-link.active {
            background: #3498db;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .total-balance {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .total-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .member-count {
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="container">
            <span class="navbar-brand text-white">👑 Admin Panel</span>
            <div class="nav nav-pills">
                <a class="nav-link" href="admin-bets.html">Bets</a>
                <a class="nav-link active" href="admin-members.html">Members</a>
                <a class="nav-link" href="admin-withdrawals.html">Withdrawals</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- Total Balance Stats -->
        <div class="stats-card">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="total-label">Total Balance of All Members</div>
                    <div class="total-balance" id="totalBalance">$0.00</div>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="member-count" id="memberCount">Total Members: 0</div>
                </div>
            </div>
        </div>

        <h2 class="mb-4">Members Management</h2>
        
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Phone Number</th>
                        <th>Wallet Balance</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <!-- Member data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadMembers() {
            fetch('/admin/members')
                .then(res => res.json())
                .then(members => {
                    displayMembers(members);
                    calculateTotalBalance(members);
                });
        }

        function displayMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            tbody.innerHTML = '';
            
            members.forEach(member => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${member.phone}</td>
                    <td>$${parseFloat(member.wallet_balance).toFixed(2)}</td>
                    <td>
                        <div class="input-group" style="max-width: 300px;">
                            <input type="number" class="form-control" 
                                   id="amount-${member.phone}" 
                                   placeholder="Amount" min="1">
                            <button class="btn btn-success" 
                                    onclick="addBalance('${member.phone}')">
                                Add Balance
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function calculateTotalBalance(members) {
            const total = members.reduce((sum, member) => {
                return sum + parseFloat(member.wallet_balance);
            }, 0);
            
            document.getElementById('totalBalance').textContent = `$${total.toFixed(2)}`;
            document.getElementById('memberCount').textContent = `Total Members: ${members.length}`;
        }

        function addBalance(phone) {
            const amount = document.getElementById(`amount-${phone}`).value;
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            // Disable button to prevent double submission
            const button = event.target;
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = 'Adding...';

            fetch('/admin/add-balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, amount: parseFloat(amount) })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Balance added successfully!');
                    document.getElementById(`amount-${phone}`).value = '';
                    loadMembers(); // Reload to update totals
                } else {
                    alert('Failed to add balance');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to add balance');
            })
            .finally(() => {
                button.disabled = false;
                button.textContent = originalText;
            });
        }

        // Load members initially and refresh every 10 seconds
        loadMembers();
        setInterval(loadMembers, 10000);

        // Check admin authentication
        if (!localStorage.getItem('adminAuth')) {
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
