<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .refresh-btn {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        .refreshing {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .last-updated {
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <span class="navbar-brand">🐎 Horse Racing</span>
            <div>
                <button class="btn btn-outline-primary me-2" onclick="window.location.href='select.html'">Back to Game</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3 class="card-title mb-0">Wallet Balance</h3>
                            <span class="refresh-btn" id="refreshBtn" onclick="refreshBalance()">🔄</span>
                        </div>
                        <div style="font-size: 48px; color: #28a745;" id="balance">$0.00</div>
                        <div class="last-updated mt-2" id="lastUpdated">Just now</div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-body">
                        <h5 class="card-title">Withdrawal Request</h5>
                        <form id="withdrawForm">
                            <div class="mb-3">
                                <label for="withdrawAmount" class="form-label">Amount ($)</label>
                                <input type="number" class="form-control" id="withdrawAmount" min="1" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Request Withdrawal</button>
                        </form>
                    </div>
                </div>

                <div class="alert alert-success mt-4" id="successMessage" style="display: none;">
                    Withdrawal request submitted successfully!
                </div>
            </div>
        </div>
    </div>

    <script>
        const userPhone = localStorage.getItem('userPhone');
        const balanceEl = document.getElementById('balance');
        const successMessage = document.getElementById('successMessage');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdatedEl = document.getElementById('lastUpdated');
        
        let refreshInterval;

        // Load wallet balance with refresh
        async function loadBalance(showRefreshAnimation = true) {
            if (showRefreshAnimation) {
                refreshBtn.classList.add('refreshing');
            }
            
            try {
                const response = await fetch(`/wallet/${userPhone}`);
                const data = await response.json();
                
                if (data.balance !== undefined) {
                    balanceEl.textContent = `$${data.balance.toFixed(2)}`;
                    localStorage.setItem('userBalance', data.balance);
                    
                    // Update last updated time
                    const now = new Date();
                    lastUpdatedEl.textContent = `Last updated: ${now.toLocaleTimeString()}`;
                }
            } catch (error) {
                console.error('Failed to load balance:', error);
            } finally {
                if (showRefreshAnimation) {
                    setTimeout(() => {
                        refreshBtn.classList.remove('refreshing');
                    }, 500);
                }
            }
        }

        // Manual refresh
        function refreshBalance() {
            loadBalance(true);
        }

        // Auto refresh every 10 seconds
        function startAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
            refreshInterval = setInterval(() => {
                loadBalance(false); // No animation for auto-refresh
            }, 10000); // Refresh every 10 seconds
        }

        // Stop auto refresh when leaving page
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });

        // Initial load
        loadBalance(true);
        startAutoRefresh();

        // Withdrawal form submission
        document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const balance = parseFloat(localStorage.getItem('userBalance'));
            
            if (amount > balance) {
                alert('Insufficient balance!');
                return;
            }

            // Disable button to prevent double submission
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, amount })
                });

                const data = await response.json();
                
                if (data.success) {
                    successMessage.style.display = 'block';
                    document.getElementById('withdrawAmount').value = '';
                    
                    // Refresh balance immediately after withdrawal
                    await loadBalance(true);
                    
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 3000);
                } else {
                    alert(data.error || 'Withdrawal failed');
                }
            } catch (error) {
                alert('Withdrawal request failed. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Also refresh when page becomes visible again (user returns to tab)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                loadBalance(false);
            }
        });
    </script>
</body>
</html>
