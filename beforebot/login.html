<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .horse-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .demo-users {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .demo-badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .user-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .demo-user-btn {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .demo-user-btn:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .password-hint {
            color: #6c757d;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="horse-icon">🐎</div>
        <h2 class="text-center mb-4">Horse Racing Betting</h2>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" required 
                       placeholder="Enter your phone number">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required 
                       placeholder="Enter your password">
                <div class="password-hint">Default password for demo users: <strong>pass123</strong></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <div class="demo-users">
            <div class="demo-badge">🎯 Demo Users (Password: pass123)</div>
            <div class="user-list" id="userList">
                <!-- Users will be populated here by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // List of 10 demo users
        const demoUsers = [
            { phone: '555-0100', password: 'pass123' },
            { phone: '555-0101', password: 'pass123' },
            { phone: '555-0102', password: 'pass123' },
            { phone: '555-0103', password: 'pass123' },
            { phone: '555-0104', password: 'pass123' },
            { phone: '555-0105', password: 'pass123' },
            { phone: '555-0106', password: 'pass123' },
            { phone: '555-0107', password: 'pass123' },
            { phone: '555-0108', password: 'pass123' },
            { phone: '555-0109', password: 'pass123' }
        ];

        // Populate user list
        const userList = document.getElementById('userList');
        demoUsers.forEach(user => {
            const userBtn = document.createElement('div');
            userBtn.className = 'demo-user-btn';
            userBtn.textContent = user.phone;
            userBtn.onclick = () => {
                document.getElementById('phone').value = user.phone;
                document.getElementById('password').value = user.password;
            };
            userList.appendChild(userBtn);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            // Disable button to prevent double submission
            const loginBtn = e.target.querySelector('button[type="submit"]');
            const originalText = loginBtn.textContent;
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('userPhone', phone);
                    localStorage.setItem('userBalance', data.user.wallet_balance);
                    window.location.href = 'select.html';
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                    loginBtn.disabled = false;
                    loginBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
            }
        });

        // Optional: Auto-fill first demo user on page load
        window.addEventListener('load', () => {
            // Uncomment to auto-fill first user
            // document.getElementById('phone').value = demoUsers[0].phone;
            // document.getElementById('password').value = demoUsers[0].password;
        });
    </script>
</body>
</html>
