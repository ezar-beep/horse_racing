<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERACTIVE HORSE RACING · tap horse to win · real odds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0f1f2b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        .race-container {
            position: relative;
            width: 1280px;
            max-width: 100%;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7);
            border: 4px solid #c9a959;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #1f4d2b;
            cursor: pointer;
            touch-action: manipulation;
        }
        /* photorealistic betting dashboard */
        .betting-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, #0c0c0cee 0%, #2d2a1fcc 100%);
            backdrop-filter: blur(12px);
            color: #f7efd6;
            padding: 16px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-top: 3px solid #f3c26b;
            text-shadow: 3px 3px 5px black;
            font-weight: 600;
            z-index: 25;
            pointer-events: none;
            letter-spacing: 0.4px;
        }
        .odds-grid {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            pointer-events: none;
        }
        .horse-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 18, 14, 0.8);
            border-radius: 60px;
            padding: 6px 22px;
            border-left: 6px solid #eabd60;
            box-shadow: inset 0 2px 5px #00000055;
            min-width: 85px;
            transition: 0.2s;
            pointer-events: none;
        }
        .horse-card.selected {
            border-left: 6px solid #ffd966;
            background: #3f3322;
            transform: scale(1.02);
            box-shadow: 0 0 18px #f9d77e;
        }
        .horse-number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        .horse-odds-value {
            font-size: 1.1rem;
            background: #222222aa;
            padding: 2px 16px;
            border-radius: 40px;
            color: #d4ffb0;
        }
        .race-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .timer-big {
            background: #141414;
            padding: 8px 26px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            border: 2px solid #dbb255;
            color: #feda7a;
            box-shadow: inset 0 0 10px black;
        }
        .selected-winner-panel {
            background: #523f1f;
            padding: 8px 30px;
            border-radius: 40px;
            font-size: 1.5rem;
            border: 2px solid #fedc83;
            display: flex;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
        }
        .selected-winner-panel button {
            background: #ffcf8a;
            border: none;
            font-size: 1.4rem;
            font-weight: 800;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            color: #3d2800;
            box-shadow: 0 4px 0 #926d2c;
            transition: 0.05s linear;
            pointer-events: auto;
        }
        .selected-winner-panel button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .selected-winner-panel span {
            font-size: 2.3rem;
            min-width: 60px;
            text-align: center;
            background: #352b18;
            padding: 0 10px;
            border-radius: 30px;
        }
        .click-hint {
            position: absolute;
            top: 20px;
            right: 30px;
            background: #2d281cdd;
            color: #ffe1a3;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 1.3rem;
            backdrop-filter: blur(4px);
            border: 2px solid #f3b85e;
            z-index: 30;
            font-weight: 600;
            box-shadow: 0 6px 12px black;
            pointer-events: none;
        }
        .click-hint i {
            font-style: normal;
            color: #ffd966;
            font-size: 1.8rem;
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="race-container">
    <canvas id="raceCanvas" width="1280" height="720"></canvas>
    
    <!-- realistic betting overlay with interactive winner select -->
    <div class="betting-ui">
        <div class="odds-grid" id="oddsGrid"></div>
        <div class="race-info">
            <div class="timer-big" id="countdownDisplay">3</div>
            <div class="selected-winner-panel">
                <button id="prevWinner">←</button>
                <span id="winnerDisplay">3</span>
                <button id="nextWinner">→</button>
            </div>
        </div>
    </div>
    <div class="click-hint">
        <i>👆</i> CLICK ON ANY HORSE TO MAKE IT WINNER
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    // ========== HORSES & WINNER (interactive) ==========
    let winnerHorse = 3;          // default
    const HORSE_COUNT = 6;
    
    // DOM elements
    const winnerDisplaySpan = document.getElementById('winnerDisplay');
    const prevBtn = document.getElementById('prevWinner');
    const nextBtn = document.getElementById('nextWinner');
    const oddsGrid = document.getElementById('oddsGrid');
    const countdownDisplay = document.getElementById('countdownDisplay');

    // Update winner from buttons
    function updateWinner(newWinner) {
        if (newWinner < 1) newWinner = 1;
        if (newWinner > HORSE_COUNT) newWinner = HORSE_COUNT;
        winnerHorse = newWinner;
        winnerDisplaySpan.innerText = winnerHorse;
        resetRace();          // restart race with new winner
    }

    prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        updateWinner(winnerHorse - 1);
    });
    nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        updateWinner(winnerHorse + 1);
    });

    // ========== RACE CONFIG ==========
    const SEGMENTS = 10;
    const SEGMENT_DURATION = 1.2;        // ~12 sec total
    let raceTime = 0.0;
    let raceActive = true;
    let animationFrame = null;
    let startCountdown = 3;
    let countdownActive = true;
    let countdownTimer = 3.0;

    // Horses data
    let horses = [];
    // odds change dynamically
    let odds = [2.2, 5.5, 1.9, 4.0, 6.2, 3.6];

    // photo finish
    let photoFinishActive = false;
    let photoTimer = 0;

    // helper: init
    function initHorses(resetTime = true) {
        horses = [];
        for (let i = 0; i < HORSE_COUNT; i++) {
            horses.push({
                number: i+1,
                pos: 0.0,
                baseSpeed: 0.55 + Math.random() * 0.4,
                offsetX: (i - 2.5) * 1.3,
                color: `hsl(${i * 45 + 20}, 70%, 58%)`,
            });
        }
        if (resetTime) raceTime = 0;
        countdownActive = true;
        countdownTimer = 3.0;
        photoFinishActive = false;
        raceActive = true;
    }
    initHorses();

    function resetRace() {
        initHorses(true);
        // randomize odds slightly each race
        odds = odds.map(() => (1.8 + Math.random() * 4.5).toFixed(1));
        // force re-render of odds
    }

    // ========== INTERACTIVE HORSE CLICK: SELECT WINNER ==========
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        // approximate hit detection on horses (based on render position)
        let minDist = 70;  // pixel radius
        let clickedHorse = null;
        
        for (let h of horses) {
            // compute same x as render
            let trackX = 100 + (canvas.width - 250) * h.pos;
            let baseY = canvas.height * 0.55 + (h.number % 3) * 40 - 10;
            let y = baseY + h.offsetX * 5;
            
            let dx = mouseX - trackX;
            let dy = mouseY - y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < minDist) {
                minDist = dist;
                clickedHorse = h.number;
            }
        }
        
        if (clickedHorse !== null) {
            // set winner to clicked horse, update display and restart race
            winnerHorse = clickedHorse;
            winnerDisplaySpan.innerText = winnerHorse;
            resetRace();
        }
    });

    // ========== UPDATE RACE ==========
    function updateRace(deltaSec) {
        if (!raceActive) return;
        if (countdownActive) {
            countdownTimer -= deltaSec;
            if (countdownTimer <= 0) {
                countdownActive = false;
            }
            return;
        }
        if (photoFinishActive) {
            photoTimer -= deltaSec;
            if (photoTimer <= 0) raceActive = false;
            return;
        }

        raceTime += deltaSec;
        let segIndex = Math.floor(raceTime / SEGMENT_DURATION);
        if (segIndex >= SEGMENTS) {
            photoFinishActive = true;
            photoTimer = 1.8;
            return;
        }

        // update positions
        for (let i = 0; i < horses.length; i++) {
            const h = horses[i];
            let increment = h.baseSpeed * 0.15; // base per sec

            if (segIndex < 6) {
                // random jockeying, lead changes
                let randFactor = 0.7 + 0.7 * Math.sin(raceTime * 2.3 + i * 1.8);
                // some horses naturally push
                if (i === 1 || i === 3 || i === 5) randFactor += 0.1;
                increment *= randFactor;
            } else {
                // last 4 segments: winner accelerates, others slower
                if (h.number === winnerHorse) {
                    // winner gets faster each passing segment
                    let segInto = segIndex - 5; // 1..4
                    let accel = 1.0 + 0.22 * segInto + 0.03 * Math.sin(raceTime * 2.0);
                    increment *= accel;
                } else {
                    // others maintain but slightly slower (suspense)
                    increment *= (0.85 + 0.03 * Math.sin(raceTime * 1.5 + i));
                }
            }

            h.pos = Math.min(1.0, h.pos + increment * deltaSec);
            
            // subtle lane shift
            if (segIndex < 6) {
                h.offsetX += (Math.random() - 0.5) * 0.08;
                h.offsetX = Math.max(-2.2, Math.min(2.2, h.offsetX));
            }
        }
    }

    // ========== RENDER ==========
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // sky & stadium (photorealistic feel)
        const gradSky = ctx.createLinearGradient(0, 0, 0, canvas.height*0.4);
        gradSky.addColorStop(0, '#1b486b');
        gradSky.addColorStop(1, '#b0cfec');
        ctx.fillStyle = gradSky;
        ctx.fillRect(0, 0, canvas.width, canvas.height*0.4);
        
        // far crowd
        ctx.fillStyle = '#4c3e2b';
        ctx.fillRect(0, canvas.height*0.3, canvas.width, canvas.height*0.15);
        for (let i=0; i<50; i++) {
            ctx.fillStyle = '#7a6234';
            ctx.beginPath();
            ctx.arc(40 + i*25, canvas.height*0.32, 6, 0, Math.PI*2);
            ctx.fill();
        }

        // track
        ctx.fillStyle = '#8c7b60';
        ctx.fillRect(0, canvas.height*0.5, canvas.width, canvas.height*0.3);
        // lane markings
        ctx.strokeStyle = '#e3d1ac';
        ctx.lineWidth = 3;
        ctx.setLineDash([18, 30]);
        for (let l=0; l<4; l++) {
            let y = canvas.height*0.5 + l*42 + 25;
            ctx.beginPath();
            ctx.moveTo(40, y);
            ctx.lineTo(canvas.width-80, y);
            ctx.strokeStyle = '#cbb68b';
            ctx.stroke();
        }
        ctx.setLineDash([]);

        // finish line
        ctx.fillStyle = '#f5f0e2';
        ctx.fillRect(canvas.width-130, canvas.height*0.5-12, 24, canvas.height*0.3+24);
        ctx.font = 'bold 28px "Courier New"';
        ctx.fillStyle = '#262216';
        ctx.fillText('FINISH', canvas.width-190, canvas.height*0.45);

        // shadows
        ctx.shadowColor = '#00000080';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 5;

        // draw horses sorted by pos (rear first)
        const sorted = [...horses].sort((a,b) => a.pos - b.pos);
        for (let h of sorted) {
            let trackX = 100 + (canvas.width - 250) * h.pos;
            let baseY = canvas.height*0.55 + (h.number % 3) * 40 - 10;
            let y = baseY + h.offsetX * 5;

            // dynamic leg phase
            let legPhase = (raceTime * 18 + h.number * 12) % (Math.PI*2);
            ctx.save();
            ctx.translate(trackX, y);

            // shadow under belly
            ctx.fillStyle = '#322d23b0';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.ellipse(8, 14, 34, 10, 0, 0, Math.PI*2);
            ctx.fill();

            // horse body (muscular)
            ctx.shadowBlur = 10;
            ctx.fillStyle = h.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 16, 0, 0, Math.PI*2);
            ctx.fill();

            // neck & head
            ctx.fillStyle = '#b3804b';
            ctx.beginPath();
            ctx.ellipse(28, -9, 14, 10, 0.25, 0, Math.PI*2);
            ctx.fill();

            // legs (gallop)
            ctx.fillStyle = '#7b5629';
            for (let leg=0; leg<4; leg++) {
                let legX = -16 + leg*14;
                let legY = 14 + Math.sin(legPhase + leg*1.7) * 8;
                ctx.fillRect(legX-4, legY, 9, 26);
            }
            // tail
            ctx.fillStyle = '#634f2b';
            ctx.fillRect(-36, -2, 12, 18);

            // glowing outline if selected winner
            if (h.number === winnerHorse) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#fde16d';
                ctx.strokeStyle = '#ffdb7c';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.ellipse(0, 0, 32, 18, 0, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.restore();

            // horse number
            ctx.font = 'bold 24px "Segoe UI"';
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 12;
            ctx.fillText(`#${h.number}`, trackX-17, y-40);
        }

        // motion blur overlay
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#c0d8ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;

        // countdown on canvas and UI
        if (countdownActive && countdownTimer > 0) {
            ctx.font = '150px "Arial Black"';
            ctx.fillStyle = '#fff6d0';
            ctx.shadowBlur = 45;
            ctx.shadowColor = '#f5a623';
            ctx.fillText(Math.ceil(countdownTimer), canvas.width/2-70, canvas.height/2);
            countdownDisplay.innerText = Math.ceil(countdownTimer);
        } else if (!countdownActive && !photoFinishActive) {
            countdownDisplay.innerText = '🚀';
        } else if (photoFinishActive) {
            ctx.font = '58px "Courier New", monospace';
            ctx.fillStyle = '#fbe176';
            ctx.shadowBlur = 30;
            ctx.fillText('📸 PHOTO FINISH', canvas.width/2-280, canvas.height/2-40);
            countdownDisplay.innerText = '📷';
        }

        // Update odds grid (dynamic)
        let oddsHtml = '';
        for (let i=0; i<HORSE_COUNT; i++) {
            let oddVal = (horses[i].pos > 0.95 ? 1.2 : parseFloat(odds[i]) - horses[i].pos * 0.15);
            oddVal = oddVal.toFixed(1);
            const selectedClass = (i+1 === winnerHorse) ? 'selected' : '';
            oddsHtml += `<div class="horse-card ${selectedClass}">
                <span class="horse-number">${i+1}</span>
                <span class="horse-odds-value">${oddVal}:1</span>
            </div>`;
        }
        oddsGrid.innerHTML = oddsHtml;
    }

    // ========== ANIMATION LOOP 60fps ==========
    let lastTimestamp = 0;
    function animate(now) {
        if (!lastTimestamp) { lastTimestamp = now; animationFrame = requestAnimationFrame(animate); return; }
        const deltaSec = Math.min(0.04, (now - lastTimestamp) / 1000);
        lastTimestamp = now;

        if (raceActive) updateRace(deltaSec);
        render();

        animationFrame = requestAnimationFrame(animate);
    }
    animationFrame = requestAnimationFrame(animate);

    // clean up
    window.addEventListener('beforeunload', () => {
        if (animationFrame) cancelAnimationFrame(animationFrame);
    });

    // restart after photo finish
    setInterval(() => {
        if (!raceActive && photoFinishActive) {
            setTimeout(() => {
                if (!raceActive) resetRace();
                raceActive = true;
            }, 1600);
        }
    }, 200);
})();
</script>
</body>
</html>
