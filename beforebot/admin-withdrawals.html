<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Withdrawals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-nav {
            background: #2c3e50;
            color: white;
        }
        .admin-nav .nav-link {
            color: white;
        }
        .admin-nav .nav-link:hover {
            background: #34495e;
        }
        .admin-nav .nav-link.active {
            background: #3498db;
        }
        .pending-badge {
            background: #ffc107;
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="container">
            <span class="navbar-brand text-white">👑 Admin Panel</span>
            <div class="nav nav-pills">
                <a class="nav-link" href="admin-bets.html">Bets</a>
                <a class="nav-link" href="admin-members.html">Members</a>
                <a class="nav-link active" href="admin-withdrawals.html">Withdrawals</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Pending Withdrawal Requests</h2>
        
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Phone Number</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdrawalsTableBody">
                    <!-- Withdrawal data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadWithdrawals() {
            fetch('/admin/withdrawals')
                .then(res => res.json())
                .then(withdrawals => {
                    const tbody = document.getElementById('withdrawalsTableBody');
                    tbody.innerHTML = '';
                    
                    if (withdrawals.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" class="text-center text-muted">
                                    No pending withdrawal requests
                                </td>
                            </tr>
                        `;
                        return;
                    }
                    
                    withdrawals.forEach(withdrawal => {
                        const row = document.createElement('tr');
                        row.id = `withdrawal-${withdrawal.id}`;
                        row.innerHTML = `
                            <td>${withdrawal.phone}</td>
                            <td>$${parseFloat(withdrawal.amount).toFixed(2)}</td>
                            <td><span class="pending-badge">${withdrawal.status}</span></td>
                            <td>
                                <button class="btn btn-success btn-sm me-2" 
                                        onclick="handleWithdrawal(${withdrawal.id}, 'approve')">
                                    Approve
                                </button>
                                <button class="btn btn-danger btn-sm" 
                                        onclick="handleWithdrawal(${withdrawal.id}, 'reject')">
                                    Reject
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                });
        }

        function handleWithdrawal(id, action) {
            fetch('/admin/approve-withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, action })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(`Withdrawal ${action}d successfully!`);
                    document.getElementById(`withdrawal-${id}`).remove();
                }
            });
        }

        // Load withdrawals initially and refresh every 3 seconds
        loadWithdrawals();
        setInterval(loadWithdrawals, 3000);

        // Check admin authentication
        if (!localStorage.getItem('adminAuth')) {
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
