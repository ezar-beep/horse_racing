<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: var(--tg-theme-bg-color, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 10px;
        }
        .login-card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .horse-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }
        h2 {
            color: var(--tg-theme-text-color, #333);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .form-label {
            color: var(--tg-theme-hint-color, #666);
        }
        .form-control {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #333);
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        .btn-primary {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            opacity: 0.5;
        }
        .demo-users {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--tg-theme-hint-color, #eee);
        }
        .demo-badge {
            background: var(--tg-theme-button-color, #28a745);
            color: var(--tg-theme-button-text-color, white);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .user-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .demo-user-btn {
            background: var(--tg-theme-bg-color, #f8f9fa);
            border: 1px solid var(--tg-theme-hint-color, #dee2e6);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            color: var(--tg-theme-text-color, #333);
        }
        .demo-user-btn:hover {
            background: var(--tg-theme-button-color, #007bff);
            color: var(--tg-theme-button-text-color, white);
            border-color: var(--tg-theme-button-color, #007bff);
        }
        .password-hint {
            color: var(--tg-theme-hint-color, #6c757d);
            font-size: 12px;
            margin-top: 5px;
        }
        #auto-login-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--tg-theme-bg-color, rgba(0,0,0,0.8));
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--tg-theme-text-color, white);
            font-size: 20px;
            font-weight: bold;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--tg-theme-hint-color, #f3f3f3);
            border-top: 4px solid var(--tg-theme-button-color, #3498db);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="horse-icon">🐎</div>
        <h2 class="text-center">Horse Racing Betting</h2>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" required 
                       placeholder="Enter phone number">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required 
                       placeholder="Enter password">
                <div class="password-hint">Demo password: <strong>pass123</strong></div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login</button>
        </form>

        <div class="demo-users">
            <div class="demo-badge">📱 Demo Users</div>
            <div class="user-list" id="userList"></div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Expand to full screen
        tg.expand();
        
        // Enable closing confirmation
        tg.enableClosingConfirmation();
        
        // Set theme colors
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor);
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor);
        document.documentElement.style.setProperty('--tg-theme-hint-color', tg.hintColor);
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor);
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor);
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.secondaryBgColor);

        console.log('✅ Mini App opened in Telegram');
        console.log('📱 User:', tg.initDataUnsafe?.user);

        // List of 10 demo users
        const demoUsers = [
            { phone: '555-0100', password: 'pass123' },
            { phone: '555-0101', password: 'pass123' },
            { phone: '555-0102', password: 'pass123' },
            { phone: '555-0103', password: 'pass123' },
            { phone: '555-0104', password: 'pass123' },
            { phone: '555-0105', password: 'pass123' },
            { phone: '555-0106', password: 'pass123' },
            { phone: '555-0107', password: 'pass123' },
            { phone: '555-0108', password: 'pass123' },
            { phone: '555-0109', password: 'pass123' }
        ];

        // Populate user list
        const userList = document.getElementById('userList');
        demoUsers.forEach(user => {
            const userBtn = document.createElement('div');
            userBtn.className = 'demo-user-btn';
            userBtn.textContent = user.phone;
            userBtn.onclick = () => {
                document.getElementById('phone').value = user.phone;
                document.getElementById('password').value = user.password;
            };
            userList.appendChild(userBtn);
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            if (!phone || !password) {
                tg.showAlert('Please enter both phone and password');
                return;
            }

            // Disable button
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('userPhone', phone);
                    localStorage.setItem('userBalance', data.user.wallet_balance);
                    
                    // Show success message
                    tg.showAlert('Login successful!');
                    
                    // Redirect to select page
                    window.location.href = 'select.html';
                } else {
                    tg.showAlert('Login failed: ' + (data.error || 'Invalid credentials'));
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                tg.showAlert('Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Auto-fill from URL parameters (for Telegram deep links)
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const phoneParam = urlParams.get('phone');
            const autoLogin = urlParams.get('auto');
            
            if (phoneParam && autoLogin === '1') {
                document.getElementById('phone').value = phoneParam;
                document.getElementById('password').value = 'telegram123';
                
                // Auto-submit after 1 second
                setTimeout(() => {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }, 1000);
            }
        })();

        // Handle back button
        tg.onEvent('backButtonClicked', () => {
            tg.close();
        });

        // Handle main button (if needed)
        tg.onEvent('mainButtonClicked', () => {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
