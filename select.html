<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Horse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        .horse-card {
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .horse-card:hover {
            transform: scale(1.05);
        }
        .horse-card.selected {
            border-color: #007bff;
            background-color: #f0f8ff;
        }
        .balance {
            font-size: 1.2rem;
            font-weight: bold;
            color: #28a745;
        }
        .countdown-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            padding: 15px 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .countdown-timer {
            font-size: 3rem;
            font-weight: bold;
            display: inline-block;
            min-width: 100px;
        }
        .countdown-label {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .race-badge {
            background: #28a745;
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.9rem;
            margin-left: 15px;
        }
        .game-id-badge {
            background: #2c3e50;
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            font-family: monospace;
            font-size: 1rem;
        }
        .progress {
            height: 10px;
            margin-top: 10px;
        }
        .time-bar {
            transition: width 1s linear;
        }
        .user-info {
            background: #f8f9fa;
            border-radius: 50px;
            padding: 5px 20px;
            margin-right: 15px;
            font-weight: 500;
            color: #2c3e50;
        }
        .user-phone {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <span class="navbar-brand">🐎 Horse Racing</span>
            <div class="d-flex align-items-center">
                <div class="user-info">
                    👤 <span class="user-phone" id="userPhoneDisplay"></span>
                </div>
                <span class="balance me-3">💰 $<span id="walletBalance">0</span></span>
                <button class="btn btn-outline-primary me-2" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="btn btn-primary" onclick="window.location.href='select.html'">Play</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Synchronized Countdown Display -->
        <div class="countdown-container">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="game-id-badge" id="currentGameId">GAME-000000</span>
                <span class="race-badge" id="raceStatus">Next Race</span>
            </div>
            <div class="countdown-label">Next Race Starts In</div>
            <div class="countdown-timer" id="countdownDisplay">60</div>
            <div class="progress mt-3">
                <div class="progress-bar bg-warning time-bar" id="timeProgress" style="width: 100%"></div>
            </div>
            <div class="mt-2 text-white-50" id="syncStatus">⏰ Synchronized</div>
        </div>

        <h2 class="text-center mb-4">Select Your Horse</h2>
        
        <div class="row mb-4" id="horseContainer">
            <!-- Horses will be generated here -->
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Place Your Bet</h5>
                        <form id="betForm">
                            <div class="mb-3">
                                <label for="betAmount" class="form-label">Bet Amount ($)</label>
                                <input type="number" class="form-control" id="betAmount" min="1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Selected Horse: <span id="selectedHorseDisplay">None</span></label>
                            </div>
                            <button type="submit" class="btn btn-success w-100" id="playBtn" disabled>Place Bet & Play</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
        const socket = io();
        let selectedHorse = null;
        let userPhone = localStorage.getItem('userPhone');
        let balance = parseFloat(localStorage.getItem('userBalance')) || 0;
        
        // Server-synchronized countdown
        let raceStartTime = null;
        let countdownInterval;

        // Auto-login from Telegram - supports both token and phone methods
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const phoneParam = urlParams.get('phone');
            const autoLogin = urlParams.get('auto');
            
            // Function to show loading overlay
            function showLoading(message) {
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'auto-login-loading';
                loadingDiv.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.8);
                    z-index: 9999;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    color: white;
                    font-size: 24px;
                    font-weight: bold;
                `;
                loadingDiv.innerHTML = `
                    <div style="margin-bottom: 20px;">${message}</div>
                    <div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                `;
                document.body.appendChild(loadingDiv);
                return loadingDiv;
            }
            
            // Handle token-based login
            if (token) {
                const loadingDiv = showLoading('🔄 Verifying your login...');
                
                fetch('/validate-telegram-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('userPhone', data.user.phone);
                        localStorage.setItem('userBalance', data.user.wallet_balance);
                        userPhone = data.user.phone;
                        balance = data.user.wallet_balance;
                        
                        loadingDiv.innerHTML = `
                            <div style="color: #28a745;">✅ Login successful!</div>
                            <div style="font-size: 18px; margin-top: 10px;">Welcome back!</div>
                        `;
                        
                        setTimeout(() => {
                            loadingDiv.remove();
                            window.history.replaceState({}, document.title, '/select.html');
                            updateBalanceDisplay();
                        }, 1000);
                    } else {
                        loadingDiv.innerHTML = `
                            <div style="color: #dc3545;">❌ Login failed</div>
                            <div style="font-size: 16px; margin-top: 10px;">${data.error || 'Please login manually'}</div>
                        `;
                        setTimeout(() => loadingDiv.remove(), 2000);
                    }
                })
                .catch(error => {
                    console.error('Auto-login error:', error);
                    loadingDiv.innerHTML = `
                        <div style="color: #dc3545;">❌ Error logging in</div>
                        <div style="font-size: 16px; margin-top: 10px;">Please try again</div>
                    `;
                    setTimeout(() => loadingDiv.remove(), 2000);
                });
            }
            // Handle phone-based auto-login
            else if (phoneParam && autoLogin === '1') {
                const loadingDiv = showLoading('🔄 Logging you in...');
                
                fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phoneParam, 
                        password: 'telegram123' 
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('userPhone', phoneParam);
                        localStorage.setItem('userBalance', data.user.wallet_balance);
                        userPhone = phoneParam;
                        balance = data.user.wallet_balance;
                        
                        loadingDiv.innerHTML = `
                            <div style="color: #28a745;">✅ Login successful!</div>
                            <div style="font-size: 18px; margin-top: 10px;">Welcome back!</div>
                        `;
                        
                        setTimeout(() => {
                            loadingDiv.remove();
                            window.history.replaceState({}, document.title, '/select.html');
                            updateBalanceDisplay();
                        }, 1000);
                    } else {
                        loadingDiv.innerHTML = `
                            <div style="color: #dc3545;">❌ Login failed</div>
                            <div style="font-size: 16px; margin-top: 10px;">Please login manually</div>
                        `;
                        setTimeout(() => loadingDiv.remove(), 2000);
                    }
                })
                .catch(error => {
                    console.error('Auto-login error:', error);
                    loadingDiv.innerHTML = `
                        <div style="color: #dc3545;">❌ Error logging in</div>
                        <div style="font-size: 16px; margin-top: 10px;">Please try again</div>
                    `;
                    setTimeout(() => loadingDiv.remove(), 2000);
                });
            }
            
            // Update balance display function
            function updateBalanceDisplay() {
                const balanceEl = document.getElementById('walletBalance');
                if (balanceEl) {
                    balanceEl.textContent = balance.toFixed(2);
                }
                const userPhoneEl = document.getElementById('userPhoneDisplay');
                if (userPhoneEl) {
                    userPhoneEl.textContent = userPhone;
                }
            }
        })();

        // Redirect to login if no phone number (after auto-login attempt)
        setTimeout(() => {
            userPhone = localStorage.getItem('userPhone');
            if (!userPhone) {
                window.location.href = 'login.html';
            }
        }, 2000);

        // Display user phone number
        const userPhoneEl = document.getElementById('userPhoneDisplay');
        if (userPhoneEl) {
            userPhoneEl.textContent = userPhone || 'Not logged in';
        }

        // Generate horse cards
        const horseContainer = document.getElementById('horseContainer');
        for (let i = 1; i <= 6; i++) {
            const col = document.createElement('div');
            col.className = 'col-md-2 col-6 mb-3';
            col.innerHTML = `
                <div class="card horse-card" data-horse="${i}">
                    <div class="card-body text-center">
                        <div style="font-size: 2rem;">🐎</div>
                        <h5>Horse ${i}</h5>
                        <small class="text-muted">${4.5}x payout</small>
                    </div>
                </div>
            `;
            horseContainer.appendChild(col);
        }

        // Update wallet balance
        function updateWalletBalance() {
            document.getElementById('walletBalance').textContent = balance.toFixed(2);
        }
        updateWalletBalance();

        // Horse selection
        document.querySelectorAll('.horse-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.horse-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                selectedHorse = this.dataset.horse;
                document.getElementById('selectedHorseDisplay').textContent = selectedHorse;
                document.getElementById('playBtn').disabled = false;
            });
        });

        // Socket events for synchronized countdown
        socket.on('connect', () => {
            console.log('Connected to server');
            socket.emit('request-timer');
        });

        socket.on('race-timer', (data) => {
            raceStartTime = data.nextRaceTime;
            document.getElementById('currentGameId').textContent = data.gameId;
            updateCountdown();
            
            if (!countdownInterval) {
                countdownInterval = setInterval(updateCountdown, 100);
            }
        });

        socket.on('race-starting-soon', (data) => {
            document.getElementById('raceStatus').textContent = 'Starting Soon';
            document.getElementById('raceStatus').style.background = '#dc3545';
        });

        socket.on('race-started', (data) => {
            document.getElementById('raceStatus').textContent = 'Racing Now';
            document.getElementById('raceStatus').style.background = '#dc3545';
        });

        function updateCountdown() {
            if (!raceStartTime) return;
            
            const now = Date.now();
            const timeLeft = Math.max(0, Math.ceil((raceStartTime - now) / 1000));
            
            const countdownEl = document.getElementById('countdownDisplay');
            countdownEl.textContent = timeLeft;
            
            const progressPercent = (timeLeft / 60) * 100;
            document.getElementById('timeProgress').style.width = `${progressPercent}%`;
            
            if (timeLeft <= 10) {
                countdownEl.style.color = '#ff4444';
                document.getElementById('timeProgress').classList.remove('bg-warning');
                document.getElementById('timeProgress').classList.add('bg-danger');
            } else if (timeLeft <= 30) {
                countdownEl.style.color = '#ffaa00';
                document.getElementById('timeProgress').classList.remove('bg-warning');
                document.getElementById('timeProgress').classList.add('bg-warning');
            } else {
                countdownEl.style.color = 'white';
                document.getElementById('timeProgress').classList.remove('bg-danger');
                document.getElementById('timeProgress').classList.add('bg-success');
            }
            
            if (timeLeft === 0) {
                document.getElementById('syncStatus').innerHTML = '🏁 Race Started';
            } else {
                document.getElementById('syncStatus').innerHTML = `⏰ Synchronized (${new Date().toLocaleTimeString()})`;
            }
        }

        // Bet form submission
        document.getElementById('betForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            
            if (!selectedHorse) {
                alert('Please select a horse!');
                return;
            }
            
            if (betAmount <= 0) {
                alert('Please enter a valid bet amount!');
                return;
            }
            
            if (betAmount > balance) {
                alert('Insufficient balance!');
                return;
            }

            const playBtn = document.getElementById('playBtn');
            playBtn.disabled = true;
            playBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: userPhone,
                        horseNumber: parseInt(selectedHorse),
                        betAmount: betAmount
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('currentBet', JSON.stringify({
                        horse: selectedHorse,
                        amount: betAmount,
                        betId: data.betId
                    }));
                    
                    if (data.gameId) {
                        localStorage.setItem('currentGameId', data.gameId);
                    }
                    
                    localStorage.setItem('userBalance', data.newBalance);
                    document.getElementById('walletBalance').textContent = data.newBalance.toFixed(2);
                    balance = data.newBalance;
                    
                    window.location.href = 'game.html';
                    
                } else {
                    alert(data.error || 'Failed to place bet');
                    playBtn.disabled = false;
                    playBtn.textContent = 'Place Bet & Play';
                }
            } catch (error) {
                console.error('Bet error:', error);
                alert('Failed to place bet. Please try again.');
                playBtn.disabled = false;
                playBtn.textContent = 'Place Bet & Play';
            }
        });

        // Load latest balance
        async function loadBalance() {
            if (!userPhone) return;
            try {
                const response = await fetch(`/wallet/${userPhone}`);
                const data = await response.json();
                if (data.balance !== undefined) {
                    balance = data.balance;
                    localStorage.setItem('userBalance', balance);
                    document.getElementById('walletBalance').textContent = balance.toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load balance:', error);
            }
        }
        
        loadBalance();

        // Clean up
        window.addEventListener('beforeunload', () => {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
        });
    </script>
</body>
</html>
